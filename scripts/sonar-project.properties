# Configuracion de SonarQube para el proyecto Selenium / SauceDemo (S8.1)
# El scanner lee este archivo desde la raiz del proyecto.

sonar.projectKey=your_project_key
sonar.organization=your_org_key
sonar.sources=src
sonar.exclusions=node_modules/*,dist/,build/*

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# La URL del servidor y el TOKEN NO se escriben aqui (mala practica).
# Se pasan por variable de entorno desde los scripts de sonarqube/:
#   SONAR_HOST_URL  y  SONAR_TOKEN   (ver sonarqube/README.md)

# La cobertura se conecta en la S8.3 (descomentar entonces):
# sonar.python.coverage.reportPaths=coverage.xml
